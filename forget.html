<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Rent Link</title>
    <link rel="stylesheet" href="forget.css">
    
    
</head>
<body>

    <header>
        <div class="logo">
            <h1><a href="landingpage.html">Rent<span>Link</span></a></h1>
        </div>
        <nav>
            <ul>
                <li><a href="landingpage.html">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contacts</a></li>
                <li><a href="Login.html" class="btn-login">Login</a></li>
                <li><a href="signin.html" class="btn-signup">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card">
            <h2>Forgot Password?</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            
            <form action="#" method="post">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <button type="submit" class="btn-reset">Send Reset Link</button>
            </form>

            <a href="Login.html" class="back-to-login">&larr; Back to Login</a>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Support</a>
        </div>
        <p>&copy; 2024 Rent Link Management System. All rights reserved.</p>
    </footer>

</body>
</html>
