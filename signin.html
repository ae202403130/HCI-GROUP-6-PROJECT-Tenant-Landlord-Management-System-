<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Rent Link</title>
    <link rel="stylesheet" href="signin.css">
</head>
<body>

    <header>
        <div class="logo">
              <h1><a href="landingpage.html">Rent<span>Link</a></span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="landingpage.html">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contacts</a></li>
                <li><a href="Login.html" class="btn-login">Login</a></li>
                <li><a href="Signin.html" class="btn-signup">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="signup-card">
                <h2>Create Account</h2>
                <p>Join Rent Link to manage your properties and payments</p>
                
                <form>
                    <div class="input-group">
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Password" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Confirm Password" required>
                    </div>

                    <button type="submit" class="cta-button signup-submit">Sign Up</button>
                </form>

                <div class="form-footer-text">
                    <p>Already have an account? <a href="#">Login here</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Support</a>
        </div>
        <p>&copy; 2026 Rent Link Management System. All rights reserved.</p>
    </footer>

</body>
</html>
